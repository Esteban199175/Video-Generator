<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Video Niche & Idea Generator</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: Arial, sans-serif;
      background: #0b1320;
      color: #e8eef7;
      padding: 30px;
      max-width: 900px;
      margin: 0 auto;
    }
    h1 { text-align: center; color: #ffffff; }
    h2 {
      color: #f5b342;
      margin-top: 40px;
      border-bottom: 1px solid #2c3a52;
      padding-bottom: 6px;
    }
    .card {
      background: #131e2f;
      border: 1px solid #1f3147;
      border-radius: 10px;
      padding: 20px;
      margin-top: 15px;
    }
    select, input, button, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 8px;
      border-radius: 6px;
      border: 1px solid #2c3a52;
      background: #0f1b2c;
      color: #e8eef7;
      font-size: 15px;
    }
    button {
      background: #2196f3;
      color: white;
      cursor: pointer;
      font-weight: bold;
      margin-top: 14px;
      border: none;
    }
    button:hover { background: #42a5f5; }
    .breadcrumb { color: #9bb0c9; font-size: 14px; margin-top: 6px; }
    .result {
      margin-top: 16px;
      background: #16263c;
      border-left: 3px solid #f5b342;
      padding: 14px;
      border-radius: 8px;
      line-height: 1.5;
    }
    .hidden { display: none; }
    label { display: block; margin-top: 12px; font-weight: bold; color: #cdd9e8; }
    .keyword-results div {
      background: #16263c;
      border-left: 3px solid #2196f3;
      padding: 10px;
      border-radius: 6px;
      margin-top: 8px;
    }
    #downloadBar {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #0b1320;
      border-bottom: 1px solid #1f3147;
      padding: 8px 20px;
      display: flex;
      justify-content: flex-end;
      z-index: 999;
    }
    #downloadBar button {
      width: auto;
      padding: 8px 18px;
      margin-top: 0;
      background: #f5b342;
      color: #0b1320;
      font-weight: bold;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 14px;
    }
    #downloadBar button:hover { background: #ffd07a; }
    body { padding-top: 60px; }
  </style>
</head>
<body>

  <div id="downloadBar">
    <button onclick="downloadPage()">⬇ Download index.html</button>
  </div>

  <h1>🎬 AI Video Niche & Idea Generator</h1>
  <p style="text-align:center;">Drill down from broad niche → sub-niche → micro-niche → high-potential video idea, then build an audience-matched offer.</p>

  <!-- STEP 1: NICHE FUNNEL -->
  <div class="card">
    <h2>1. Find Your Sub-Niche Idea</h2>

    <label for="nicheSelect">Pick a broad niche</label>
    <select id="nicheSelect"></select>

    <label for="subNicheSelect">Pick a sub-niche</label>
    <select id="subNicheSelect"></select>

    <label for="microNicheSelect">Pick a micro-niche</label>
    <select id="microNicheSelect"></select>

    <div class="breadcrumb" id="breadcrumb"></div>
    <button id="ideaBtn">Generate Sub-Niche Idea</button>
    <div class="result hidden" id="ideaResult"></div>
  </div>

  <!-- STEP 2: KEYWORD SEARCH -->
  <div class="card">
    <h2>2. Search Ideas by Keyword</h2>
    <input type="text" id="keywordInput" placeholder="e.g. fitness, money, AI, parenting...">
    <button id="keywordBtn">Search</button>
    <div class="keyword-results" id="keywordResults"></div>
  </div>

  <!-- STEP 3: AUDIENCE / OFFER BUILDER -->
  <div class="card">
    <h2>3. Build Your Audience-Matched Offer</h2>
    <label for="ageRange">Audience age range</label>
    <select id="ageRange">
      <option>13-17</option>
      <option>18-24</option>
      <option selected>25-34</option>
      <option>35-44</option>
      <option>45-60</option>
      <option>60+</option>
    </select>

    <label for="demographic">Audience description (gender, lifestyle, income level, etc.)</label>
    <input type="text" id="demographic" placeholder="e.g. busy working moms, side-hustle students...">

    <label for="problem">What PROBLEM does this audience have?</label>
    <textarea id="problem" rows="2" placeholder="e.g. They feel stuck in a 9-5 and want extra income"></textarea>

    <label for="solution">What SOLUTION / transformation do you offer?</label>
    <textarea id="solution" rows="2" placeholder="e.g. A step-by-step system to launch a side business in 30 days"></textarea>

    <button id="offerBtn">Generate Offer & Video Angle</button>
    <div class="result hidden" id="offerResult"></div>
  </div>

<script>
  function downloadPage() {
    const blob = new Blob([document.documentElement.outerHTML], { type: 'text/html' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'index.html';
    a.click();
    URL.revokeObjectURL(a.href);
  }
